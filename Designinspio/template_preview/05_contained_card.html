  </div>
  <!-- CTA pill overlapping card bottom edge -->
  <div style="position:absolute; bottom:calc(60px + 20px); left:50%; transform:translateX(-50%); display:inline-block; padding:14px 36px; background:linear-gradient(135deg,#6B21A8,#E91E8C); border-radius:9999px; font-size:15px; font-weight:700; color:#FFFFFF; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(107,33,168,0.3); z-index:3;">Apply in 2 Minutes</div>
